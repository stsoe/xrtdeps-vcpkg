# Build XRT Windows dependencies (vcpkg) on windows-latest and windows-11-arm.
# All dependencies are static libs except OpenCL: the ICD loader is built as opencl.dll (dynamic).
# Download the matching artifact and extract to use as EXT_DIR (build\build22.bat -ext <path>).

name: Build dependencies

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            triplet: x64-windows-static
            triplet_dynamic: x64-windows
          - runner: windows-11-arm
            triplet: arm64-windows-static
            triplet_dynamic: arm64-windows
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSVC
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: "[17.10,17.14)"
          vs-version: "[17.0,18.0)"

      - name: Bootstrap vcpkg
        run: .\vcpkg\bootstrap-vcpkg.bat -disableMetrics
        working-directory: ${{ github.workspace }}

      - name: Install dependencies (static, release + debug)
        run: |
          $env:VCPKG_BINARY_SOURCES = "clear"
          .\vcpkg\vcpkg.exe install --x-manifest-root="${{ github.workspace }}" --triplet=${{ matrix.triplet }}
        working-directory: ${{ github.workspace }}

      - name: Install OpenCL ICD loader as dynamic (opencl.dll)
        run: |
          $env:VCPKG_BINARY_SOURCES = "clear"
          .\vcpkg\vcpkg.exe install opencl --triplet=${{ matrix.triplet_dynamic }} --classic
        working-directory: ${{ github.workspace }}

      - name: Copy OpenCL DLL and import lib into static tree
        run: |
          $static = "${{ github.workspace }}\vcpkg_installed\${{ matrix.triplet }}"
          $dynamic = "${{ github.workspace }}\vcpkg\installed\${{ matrix.triplet_dynamic }}"
          # Replace static OpenCL lib with import lib for opencl.dll; copy DLL to bin
          Remove-Item -Path "$static\lib\OpenCL.lib" -ErrorAction SilentlyContinue
          Remove-Item -Path "$static\debug\lib\OpenCL.lib" -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path "$static\bin" -Force | Out-Null
          Copy-Item -Path "$dynamic\bin\opencl.dll" -Destination "$static\bin\" -Force
          Copy-Item -Path "$dynamic\lib\OpenCL.lib" -Destination "$static\lib\" -Force
        shell: pwsh
        working-directory: ${{ github.workspace }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xrt-deps-${{ matrix.triplet }}
          path: ${{ github.workspace }}/vcpkg_installed/${{ matrix.triplet }}
